[phases.setup]
nixPkgs = ["nodejs_22", "python3", "gcc", "gnumake", "pkg-config"]

[phases.install]
# Только нужные workspace (без Strapi). React ставим в корень — иначе dedupe удалит единственную копию.
cmds = [
  "npm install --legacy-peer-deps --ignore-scripts --workspace=@med-site/web --workspace=@med-site/bff --workspace=@med-site/contracts --workspace=@med-site/page-engine",
  "npm install --legacy-peer-deps --ignore-scripts react@18.3.1 react-dom@18.3.1",
  "node scripts/dedupe-react.mjs"
]

[phases.build]
cmds = [
  "npm run build:packages",
  "npm run build -w @med-site/bff",
  "npm run build -w @med-site/web"
]

[start]
cmd = "node scripts/start-platform.mjs"

[variables]
NODE_ENV = "production"
DATA_MODE = "hybrid"
STRAPI_URL = "https://cms.istochnik.smitx.ru"
BFF_PORT = "3001"
