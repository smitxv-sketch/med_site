[phases.setup]
nixPkgs = ["nodejs_22", "python3", "gcc", "gnumake", "pkg-config"]

[phases.install]
# Полный install (проверенный путь) + dedupe вложенного React 19
cmds = [
  "npm install --legacy-peer-deps --ignore-scripts",
  "node scripts/dedupe-react.mjs"
]

[phases.build]
cmds = [
  "npm run build:packages",
  "npm run build -w @med-site/bff",
  "npm run build -w @med-site/web"
]

[start]
cmd = "node scripts/start-platform.mjs"

[variables]
NIXPACKS_NODE_VERSION = "22.13.1"
NODE_ENV = "production"
DATA_MODE = "hybrid"
STRAPI_URL = "https://cms.istochnik.smitx.ru"
BFF_PORT = "3001"
